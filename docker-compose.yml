version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mastercoderai-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webui:
    image: node:16
    working_dir: /app
    volumes:
      - ./frontend/webui:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    restart: unless-stopped

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: masteruser
      POSTGRES_PASSWORD: masterpass
      POSTGRES_DB: masterdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
