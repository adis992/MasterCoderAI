services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS: requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
    container_name: mastercoderai-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://masteruser:masterpass@postgres/masterdb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REQUIREMENTS: requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "src/bot/bot.py"]
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://masteruser:masterpass@postgres/masterdb
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  webui:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend/webui:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    restart: unless-stopped

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: masteruser
      POSTGRES_PASSWORD: masterpass
      POSTGRES_DB: masterdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masteruser -d masterdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
