# Merged bot service from `gotovi_bot/docker-compose.yml`
services:
  api:
    build:
      context: gotovi_bot
      dockerfile: Dockerfile
    container_name: mastercoderai-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["python", "src/api/main.py"]

  bot:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
