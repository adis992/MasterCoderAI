name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and push Docker image
      run: |
        docker build -t your-dockerhub-username/mastercoderai:latest .
        docker push your-dockerhub-username/mastercoderai:latest

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f infrastruktura/kubernetes/deployment.yaml
        kubectl apply -f infrastruktura/kubernetes/service.yaml

    - name: Deploy to server
      run: |
        echo "Deploying application..."
        # Add deployment commands here, e.g., SSH to server and pull latest changes